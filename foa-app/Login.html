<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FOA - Acceso</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { background: #1a365d; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }
    .login-box { background: white; border-radius: 12px; padding: 2rem; width: 100%; max-width: 360px; }
    h4 { color: #1a365d; font-weight: 800; }
  </style>
</head>
<body>
  <div class="login-box">
    <h4 class="mb-1">FOA</h4>
    <p class="text-muted small mb-4">Forwarding Operations Assistant</p>
    <div class="mb-3">
      <label class="form-label">Email</label>
      <input class="form-control" id="inp-email" type="email" placeholder="tu@email.com">
    </div>
    <div class="mb-3">
      <label class="form-label">Contrasena</label>
      <input class="form-control" id="inp-pass" type="password">
    </div>
    <div id="msg-error" class="alert alert-danger py-2 mb-3" style="display:none"></div>
    <button class="btn w-100 text-white" style="background:#1a365d" id="btn-entrar">Entrar</button>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    document.getElementById("btn-entrar").addEventListener("click", function() {
      var email = document.getElementById("inp-email").value.trim();
      var pass = document.getElementById("inp-pass").value;
      var errEl = document.getElementById("msg-error");
      if (!email || !pass) {
        errEl.textContent = "Completa email y contrasena.";
        errEl.style.display = "block";
        return;
      }
      errEl.style.display = "none";
      document.getElementById("btn-entrar").textContent = "Verificando...";
      google.script.run
        .withSuccessHandler(function(r) {
          if (r.success) {
            window.location.href = window.location.href.split("?")[0] + "?token=" + r.token;
          } else {
            errEl.textContent = r.error;
            errEl.style.display = "block";
            document.getElementById("btn-entrar").textContent = "Entrar";
          }
        })
        .withFailureHandler(function(e) {
          errEl.textContent = "Error: " + e.message;
          errEl.style.display = "block";
          document.getElementById("btn-entrar").textContent = "Entrar";
        })
        .loginAndGetToken(email, pass);
    });
  </script>
</body>
</html>
